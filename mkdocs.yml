site_name: "CS 6250: Computer Networks"
site_description: "Study Guide & Solutions for Georgia Tech CS 6250"
site_url: https://lukehiura.github.io/cs6250-study-guide/

repo_url: https://github.com/lukehiura/cs6250-study-guide
repo_name: cs6250-study-guide
edit_uri: edit/master/docs/

theme:
  name: material
  font:
    text: Source Sans 3
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Navigation — see .cursor/rules/mkdocs-theme.mdc
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.footer
    - toc.follow
    # Content & search
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.action.view
  icon:
    logo: material/lan
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  favicon: assets/favicon.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

plugins:
  - privacy
  - search
  - tags
  - social:
      cards_layout_options:
        font_family: Source Sans 3
  - optimize:
      enabled: !ENV [CI, false]
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - git-authors
  - mkdocs_quiz:
      shuffle_answers: true
      show_progress: true
      confetti: true
      disable_after_submit: false

copyright: Copyright &copy; 2026 Luke Hiura — unofficial study notes for Georgia Tech CS 6250

extra:
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            <a href="https://github.com/lukehiura/cs6250-study-guide/issues/new/" target="_blank" rel="noopener">opening a GitHub issue</a>.
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lukehiura/cs6250-study-guide
      name: cs6250-study-guide on GitHub

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/feedback.js

