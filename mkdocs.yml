site_name: "CS 6250: Computer Networks"
site_description: "Study Guide & Solutions for Georgia Tech CS 6250"
site_url: https://lukehiura.github.io/cs6250-study-guide/

repo_url: https://github.com/lukehiura/cs6250-study-guide
repo_name: cs6250-study-guide
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - navigation.footer
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - git-authors
  - mkdocs_quiz:
      shuffle_answers: true
      show_progress: true
      confetti: true
      disable_after_submit: false

copyright: Copyright &copy; 2026 Luke Hiura — unofficial study notes for Georgia Tech CS 6250

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lukehiura/cs6250-study-guide
      name: cs6250-study-guide on GitHub

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Lesson 1 - Introduction & Internet Architecture:
      - Full guide: lesson-01/introduction.md
      - Plain-language guide: lesson-01/plain-language.md
      - Quick study guide: lesson-01/quick-study-guide.md
      - Interactive quiz: lesson-01/quiz.md
  - Lesson 2 - Transport Layer:
      - Full guide: lesson-02/transport-application.md
      - Plain-language guide: lesson-02/plain-language.md
      - Quick study guide: lesson-02/quick-study-guide.md
      - Interactive quiz: lesson-02/quiz.md
  - Lesson 3 - Intradomain Routing:
      - Full guide: lesson-03/intradomain-routing.md
      - Plain-language guide: lesson-03/plain-language.md
      - Quick study guide: lesson-03/quick-study-guide.md
      - Interactive quiz: lesson-03/quiz.md
  - Lesson 4 - Interdomain Routing:
      - Full guide: lesson-04/interdomain-routing.md
      - Plain-language guide: lesson-04/plain-language.md
      - Quick study guide: lesson-04/quick-study-guide.md
      - Interactive quiz: lesson-04/quiz.md
  - Lesson 5 - Router Design & Algorithms (Part 1):
      - Full guide: lesson-05/router-design-1.md
      - Plain-language guide: lesson-05/plain-language.md
      - Quick study guide: lesson-05/quick-study-guide.md
      - Interactive quiz: lesson-05/quiz.md
  - Lesson 6 - Router Design & Algorithms (Part 2): lesson-06/router-design-2.md
  - Lesson 7 - SDN (Part 1): lesson-07/sdn-1.md
  - Lesson 8 - SDN (Part 2): lesson-08/sdn-2.md
  - Lesson 9 - Internet Security: lesson-09/security.md
  - Lesson 10 - Surveillance & Censorship: lesson-10/surveillance-censorship.md
  - Lesson 11 - Applications (Video): lesson-11/video.md
  - Lesson 12 - Applications (CDNs & Overlay Networks): lesson-12/cdns-overlay.md
  - Practice Questions: practice-questions.md
