site_name: "CS 6250: Computer Networks"
site_description: "Study Guide & Solutions for Georgia Tech CS 6250"
site_url: https://lukehiura.github.io/cs6250-study-guide/

repo_url: https://github.com/lukehiura/cs6250-study-guide
repo_name: cs6250-study-guide
edit_uri: edit/master/docs/

theme:
  name: material
  font:
    text: Source Sans 3
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Navigation — see .cursor/rules/mkdocs-theme.mdc
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.footer
    - toc.follow
    # Content & search
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - git-authors
  - mkdocs_quiz:
      shuffle_answers: true
      show_progress: true
      confetti: true
      disable_after_submit: false

copyright: Copyright &copy; 2026 Luke Hiura — unofficial study notes for Georgia Tech CS 6250

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lukehiura/cs6250-study-guide
      name: cs6250-study-guide on GitHub

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Foundations:
      - Lesson 1 — Introduction:
          - Guide: lesson-01/introduction.md
          - Plain-language: lesson-01/plain-language.md
          - Quick study: lesson-01/quick-study-guide.md
          - Quiz: lesson-01/quiz.md
      - Lesson 2 — Transport:
          - Guide: lesson-02/transport-application.md
          - Plain-language: lesson-02/plain-language.md
          - Quick study: lesson-02/quick-study-guide.md
          - Quiz: lesson-02/quiz.md
  - Routing:
      - Lesson 3 — Intradomain Routing:
          - Guide: lesson-03/intradomain-routing.md
          - Plain-language: lesson-03/plain-language.md
          - Quick study: lesson-03/quick-study-guide.md
          - Quiz: lesson-03/quiz.md
      - Lesson 4 — Interdomain Routing:
          - Guide: lesson-04/interdomain-routing.md
          - Plain-language: lesson-04/plain-language.md
          - Quick study: lesson-04/quick-study-guide.md
          - Quiz: lesson-04/quiz.md
  - Router Design:
      - Lesson 5 — Part 1:
          - Guide: lesson-05/router-design-1.md
          - Plain-language: lesson-05/plain-language.md
          - Quick study: lesson-05/quick-study-guide.md
          - Quiz: lesson-05/quiz.md
      - Lesson 6 — Part 2: lesson-06/router-design-2.md
  - SDN:
      - Lesson 7 — Part 1: lesson-07/sdn-1.md
      - Lesson 8 — Part 2: lesson-08/sdn-2.md
  - Security:
      - Lesson 9 — Internet Security: lesson-09/security.md
      - Lesson 10 — Surveillance & Censorship: lesson-10/surveillance-censorship.md
  - Applications:
      - Lesson 11 — Video: lesson-11/video.md
      - Lesson 12 — CDNs & Overlays: lesson-12/cdns-overlay.md
  - Practice: practice-questions.md
